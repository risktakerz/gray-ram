<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gray Ram | Yvain Anwar</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0a0a0a; font-family: 'Georgia', serif; }
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .ghost { position: absolute; width: 80px; height: 100px; background: rgba(200, 200, 200, 0.15); border-radius: 50% 50% 0 0; box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); pointer-events: none; animation: float linear infinite; z-index: -1; }
        @keyframes float { 0% { transform: translateY(110vh) scale(1); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { transform: translateY(-20vh) scale(1.2); opacity: 0; } }
        .character-bg-sprite { position: absolute; top: 55%; left: 60%; transform: translate(-50%, -50%); height: 90vh; opacity: 0.8; z-index: 1; pointer-events: none; }
        .container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; z-index: 10; position: relative; }
        .title { font-size: 5rem; color: #ffffff; text-transform: uppercase; letter-spacing: 15px; margin: 0; text-shadow: 0 0 15px rgba(0, 0, 0, 1), 0 0 30px rgba(160, 32, 240, 0.8); animation: glow 3s ease-in-out infinite alternate; }
        .subtitle { font-size: 1.5rem; color: #aaa; margin-top: 10px; letter-spacing: 5px; font-style: italic; text-shadow: 2px 2px 4px rgba(0,0,0,1); }
        @keyframes glow { from { text-shadow: 0 0 10px rgba(160, 32, 240, 0.5); } to { text-shadow: 0 0 20px rgba(0, 0, 0, 1), 0 0 40px rgba(160, 32, 240, 0.9); } }
    </style>
</head>
<body>
    <audio autoplay loop id="audio-player">
        <source src="theme.mp3" type="audio/mpeg">
    </audio>

    <div id="bg-container"></div>
    <img src="Yvain_Anwar_transparent_sprite.png" class="character-bg-sprite" alt="Yvain Anwar">

    <div class="container">
        <h1 class="title">GRAY RAM</h1>
        <div class="subtitle">Yvain Anwar</div>
    </div>

    <script>
        const container = document.getElementById('bg-container');
        for (let i = 0; i < 12; i++) {
            const ghost = document.createElement('div');
            ghost.classList.add('ghost');
            ghost.style.left = Math.random() * 100 + 'vw';
            ghost.style.animationDuration = (15 + Math.random() * 10) + 's';
            ghost.style.animationDelay = (Math.random() * -20) + 's';
            container.appendChild(ghost);
        }
    </script>
</body>
</html>
